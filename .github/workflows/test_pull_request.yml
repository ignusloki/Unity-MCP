name: test-pull-request

on:
  workflow_dispatch:

  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened]

jobs:
  save-event-file:
    runs-on: ubuntu-latest
    steps:
      - name: Save event file for publish workflow
        uses: actions/upload-artifact@v6
        with:
          name: Event File
          path: ${{ github.event_path }}

  test-cli:
    uses: ./.github/workflows/test_cli.yml

  # NOTE: the MCP server is no longer built from this repo — the plugin consumes the shared
  # GameDev-MCP-Server (https://github.com/IvanMurzak/GameDev-MCP-Server) release pinned by
  # McpServerManager.ServerVersion.

  # --- UNITY TESTS ---
  # -------------------

  # --- EDIT MODE ---

  test-unity-2022-3-62f3-editmode:
    uses: ./.github/workflows/test_unity_plugin.yml
    with:
      projectPath: "./Unity-Tests/2022.3.62f3"
      unityVersion: "2022.3.62f3"
      testMode: "editmode"
    secrets: inherit

  test-unity-2023-2-22f1-editmode:
    uses: ./.github/workflows/test_unity_plugin.yml
    with:
      projectPath: "./Unity-Tests/2023.2.22f1"
      unityVersion: "2023.2.22f1"
      testMode: "editmode"
    secrets: inherit

  test-unity-6000-3-1f1-editmode:
    uses: ./.github/workflows/test_unity_plugin.yml
    with:
      projectPath: "./Unity-Tests/6000.3.1f1"
      unityVersion: "6000.3.1f1"
      testMode: "editmode"
    secrets: inherit

