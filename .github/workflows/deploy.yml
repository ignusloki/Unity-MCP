name: deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Deploy CLI to npm version (e.g., 1.0.0)."
        required: true
        type: string

  workflow_call:
    inputs:
      version: { required: true, type: string }

# NOTE: the MCP server NuGet dotnet-tool (`unity-mcp-server`) and Docker image
# (`ivanmurzakdev/unity-mcp-server`) publish jobs were removed — the server now lives in the
# shared GameDev-MCP-Server repo (https://github.com/IvanMurzak/GameDev-MCP-Server), which owns
# the binary/Docker (`aigamedeveloper/mcp-server`) release channels. Those legacy channels stop
# receiving updates.
jobs:
  deploy-cli-to-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Extract version from tag
        id: version
        run: |
          version=${{ inputs.version }}
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Extracted version: $version"

      - name: Set package version
        run: |
          cd cli
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: |
          cd cli
          npm ci

      - name: Build
        run: |
          cd cli
          npm run build

      - name: Test
        run: |
          cd cli
          npm test

      - name: Publish to npm with provenance
        run: |
          cd cli
          npm publish --access public --provenance
